name: Android

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional release tag, for example v0.1.0. Leave empty to only build."
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare optional release signing
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_SIGNING_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [[ -z "${KEYSTORE_BASE64}${STORE_PASSWORD}${KEY_ALIAS}${KEY_PASSWORD}" ]]; then
            echo "Release signing secrets are not configured; building an unsigned release APK."
            exit 0
          fi

          if [[ -z "${KEYSTORE_BASE64}" || -z "${STORE_PASSWORD}" || -z "${KEY_ALIAS}" || -z "${KEY_PASSWORD}" ]]; then
            echo "Release signing is partially configured. Set all ANDROID_SIGNING_* secrets or none of them." >&2
            exit 1
          fi

          mkdir -p "${RUNNER_TEMP}/signing"
          printf '%s' "${KEYSTORE_BASE64}" | base64 -d > "${RUNNER_TEMP}/signing/release.keystore"
          echo "ANDROID_KEYSTORE_PATH=${RUNNER_TEMP}/signing/release.keystore" >> "${GITHUB_ENV}"

      - name: Build
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
        run: nix develop --command gradle :app:assembleRelease

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          safe_ref_name="$(printf '%s' "${GITHUB_REF_NAME:-manual}" | tr '/[:space:]' '-')"

          shopt -s nullglob
          apks=(app/build/outputs/apk/release/*.apk)
          if [[ "${#apks[@]}" -ne 1 ]]; then
            echo "Expected exactly one release APK, found ${#apks[@]}" >&2
            printf '%s\n' "${apks[@]}" >&2
            exit 1
          fi

          apk_path="${apks[0]}"
          apk_kind="release"
          if [[ "$(basename "${apk_path}")" == *unsigned* ]]; then
            apk_kind="release-unsigned"
          fi

          apk_name="camera-silencer-${safe_ref_name}-${apk_kind}.apk"
          cp "${apk_path}" "dist/${apk_name}"
          sha256sum "dist/${apk_name}" > "dist/${apk_name}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: camera-silencer-apk
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
    permissions:
      contents: write

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v5
        with:
          name: camera-silencer-apk
          path: dist

      - name: Resolve release tag
        id: release
        shell: bash
        env:
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && -n "${INPUT_RELEASE_TAG}" ]]; then
            tag="${INPUT_RELEASE_TAG}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "${tag}" =~ ^v[0-9]+(\.[0-9]+)*([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must look like v0.1.0" >&2
            exit 1
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Create or update release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" dist/* --clobber --repo "${GITHUB_REPOSITORY}"
          else
            gh release create "${RELEASE_TAG}" dist/* \
              --repo "${GITHUB_REPOSITORY}" \
              --target "${GITHUB_SHA}" \
              --title "${RELEASE_TAG}" \
              --notes "Automated release build for ${RELEASE_TAG}. If the APK name contains release-unsigned, it is intended for F-Droid-style repository signing and is not directly installable until signed."
          fi
