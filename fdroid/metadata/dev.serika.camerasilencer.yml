AutoName: Camera Silencer
Summary: Reduce camera audio while a camera is active
Description: |-
  Camera Silencer detects camera use through Android's public camera
  availability API and temporarily reduces audio output while a camera is
  active.

  It does not request camera, internet, accessibility, usage access, overlay,
  or DND policy permissions.

  Effectiveness depends on the device, OS build, region configuration, and
  camera app implementation. Some camera apps may use enforced audio paths that
  cannot be suppressed reliably with normal app permissions.

